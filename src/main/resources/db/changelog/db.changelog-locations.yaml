databaseChangeLog:
  - changeSet:
      id: 1
      author: jakundaf
      changes:
        - createTable:
            tableName: location
            columns:
              - column:
                  name: id
                  type: SERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: country
                  type: VARCHAR(255)
              - column:
                  name: lat
                  type: DOUBLE
              - column:
                  name: lon
                  type: DOUBLE

        - insert:
            tableName: location
            columns:
              - column: { name: name, value: "Jastarnia" }
              - column: { name: country, value: "Poland" }
              - column: { name: lat, valueNumeric: 54.7084 }
              - column: { name: lon, valueNumeric: 18.6554 }

        - insert:
            tableName: location
            columns:
              - column: { name: name, value: "Bridgetown" }
